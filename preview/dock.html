<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --cx-ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    font-family: 'Geist', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 100vh;
    padding-bottom: 16px;
  }
  .dock {
    background: rgba(30, 30, 30, 0.85);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .dock-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    cursor: pointer;
    transition: transform 180ms var(--cx-ease-spring);
    user-select: none;
  }
  .dock-icon:hover {
    transform: scale(1.2);
    background: rgba(255,255,255,0.10);
  }
  .dock-icon:active {
    transform: scale(0.92);
    transition-duration: 60ms;
  }
  .sep {
    width: 1px;
    height: 28px;
    background: rgba(255,255,255,0.08);
    margin: 0 4px;
  }
</style>
</head>
<body>
  <nav class="dock">
    <div class="dock-icon" title="Files">📁</div>
    <div class="dock-icon" title="Browser">🌐</div>
    <div class="dock-icon" title="Terminal">⌨️</div>
    <div class="dock-icon" title="Editor">📝</div>
    <div class="dock-icon" title="Mail">📧</div>
    <div class="sep"></div>
    <div class="dock-icon" title="Search">🔍</div>
    <div class="sep"></div>
    <div class="dock-icon" title="Power">⏻</div>
  </nav>
</body>
</html>
